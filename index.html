<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Online Compiler</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    color: #1a1a1a;
  }
  h1 { font-size: 1.4rem; }
  label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.9rem; }
  select, input[type="file"] {
    display: block;
    margin-top: 6px;
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
  }
  button {
    margin-top: 20px;
    padding: 10px 18px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #status { margin-top: 16px; font-size: 0.9rem; white-space: pre-wrap; }
  #status.error { color: #c0392b; }
  #status.success { color: #1e7d34; }
</style>
</head>
<body>

<h1>Compile to Windows .exe</h1>

<label for="backendUrl">Backend URL</label>
<input type="text" id="backendUrl" placeholder="https://your-backend-url.example.com" />

<label for="language">Language</label>
<select id="language">
  <option value="cpp">C++</option>
  <option value="csharp">C#</option>
  <option value="python">Python</option>
</select>

<label for="fileInput">Source file</label>
<input type="file" id="fileInput" />

<button id="compileBtn">Compile</button>

<div id="status"></div>

<script>
const backendUrlInput = document.getElementById('backendUrl');
const languageSelect = document.getElementById('language');
const fileInput = document.getElementById('fileInput');
const compileBtn = document.getElementById('compileBtn');
const statusEl = document.getElementById('status');

// Remember the backend URL between visits
backendUrlInput.value = localStorage.getItem('compilerBackendUrl') || '';

compileBtn.addEventListener('click', async () => {
  const backendUrl = backendUrlInput.value.trim().replace(/\/$/, '');
  const language = languageSelect.value;
  const file = fileInput.files[0];

  statusEl.className = '';
  statusEl.textContent = '';

  if (!backendUrl) {
    statusEl.className = 'error';
    statusEl.textContent = 'Enter your backend URL first.';
    return;
  }
  if (!file) {
    statusEl.className = 'error';
    statusEl.textContent = 'Choose a source file first.';
    return;
  }

  localStorage.setItem('compilerBackendUrl', backendUrl);

  const formData = new FormData();
  formData.append('file', file);

  compileBtn.disabled = true;
  statusEl.textContent = 'Compiling... this can take a little while.';

  try {
    const response = await fetch(`${backendUrl}/compile/${language}`, {
      method: 'POST',
      body: formData,
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText);
    }

    const blob = await response.blob();
    const downloadUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = downloadUrl;
    a.download = language === 'python' ? 'script.exe' : 'output.exe';
    document.body.appendChild(a);
    a.click();
    a.remove();

    statusEl.className = 'success';
    statusEl.textContent = 'Done — download started.';
  } catch (err) {
    statusEl.className = 'error';
    statusEl.textContent = 'Failed:\n' + err.message;
  } finally {
    compileBtn.disabled = false;
  }
});
</script>

</body>
</html>
