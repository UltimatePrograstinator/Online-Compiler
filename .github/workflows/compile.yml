name: Compile to EXE

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to compile"
        required: true
        type: choice
        options:
          - cpp
          - csharp
          - python
      source_path:
        description: "Path to the source file in this repo"
        required: true
        type: string

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- C++ ----------
      - name: Set up MSYS2 (C++)
        if: inputs.language == 'cpp'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Compile C++
        if: inputs.language == 'cpp'
        shell: msys2 {0}
        run: |
          mkdir -p final
          g++ "${{ inputs.source_path }}" -o final/output.exe -O2 -static

      # ---------- C# ----------
      - name: Set up .NET
        if: inputs.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compile C#
        if: inputs.language == 'csharp'
        shell: bash
        run: |
          mkdir -p build_cs
          cp "${{ inputs.source_path }}" build_cs/Program.cs
          cat > build_cs/app.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <AssemblyName>output</AssemblyName>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
            </PropertyGroup>
          </Project>
          EOF
          cd build_cs
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ../final
          cd ..
          mv final/output.exe final/output.exe 2>/dev/null || true

      # ---------- Python ----------
      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python
        if: inputs.language == 'python'
        shell: bash
        run: |
          pip install pyinstaller
          mkdir -p final
          pyinstaller --onefile --distpath dist "${{ inputs.source_path }}"
          cp dist/*.exe final/output.exe

      # ---------- Upload result ----------
      - name: Upload compiled exe
        uses: actions/upload-artifact@v4
        with:
          name: compiled-exe
          path: final/output.exe
          retention-days: 1
